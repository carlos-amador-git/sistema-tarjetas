# ============================================
# CardSystem - Docker Compose
# Next.js + Prisma + PostgreSQL
# ============================================

services:
  # Aplicación principal (Next.js con API integrada)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL:-}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
        - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
        - NEXT_PUBLIC_APP_VERSION=${NEXT_PUBLIC_APP_VERSION:-0.1.0}
        - NEXT_PUBLIC_DEMO_MODE=${NEXT_PUBLIC_DEMO_MODE:-false}
        - NEXT_PUBLIC_DEMO_ADMIN_USER=${NEXT_PUBLIC_DEMO_ADMIN_USER:-}
        - NEXT_PUBLIC_DEMO_ADMIN_PASS=${NEXT_PUBLIC_DEMO_ADMIN_PASS:-}
        - NEXT_PUBLIC_DEMO_ADMIN_LABEL=${NEXT_PUBLIC_DEMO_ADMIN_LABEL:-}
        - NEXT_PUBLIC_DEMO_ALMACEN_USER=${NEXT_PUBLIC_DEMO_ALMACEN_USER:-}
        - NEXT_PUBLIC_DEMO_ALMACEN_PASS=${NEXT_PUBLIC_DEMO_ALMACEN_PASS:-}
        - NEXT_PUBLIC_DEMO_ALMACEN_LABEL=${NEXT_PUBLIC_DEMO_ALMACEN_LABEL:-}
        - NEXT_PUBLIC_DEMO_LOGISTICA_USER=${NEXT_PUBLIC_DEMO_LOGISTICA_USER:-}
        - NEXT_PUBLIC_DEMO_LOGISTICA_PASS=${NEXT_PUBLIC_DEMO_LOGISTICA_PASS:-}
        - NEXT_PUBLIC_DEMO_LOGISTICA_LABEL=${NEXT_PUBLIC_DEMO_LOGISTICA_LABEL:-}
        - NEXT_PUBLIC_DEMO_SUCURSALES_USER=${NEXT_PUBLIC_DEMO_SUCURSALES_USER:-}
        - NEXT_PUBLIC_DEMO_SUCURSALES_PASS=${NEXT_PUBLIC_DEMO_SUCURSALES_PASS:-}
        - NEXT_PUBLIC_DEMO_SUCURSALES_LABEL=${NEXT_PUBLIC_DEMO_SUCURSALES_LABEL:-}
        - NEXT_PUBLIC_DEMO_CONSULTA_USER=${NEXT_PUBLIC_DEMO_CONSULTA_USER:-}
        - NEXT_PUBLIC_DEMO_CONSULTA_PASS=${NEXT_PUBLIC_DEMO_CONSULTA_PASS:-}
        - NEXT_PUBLIC_DEMO_CONSULTA_LABEL=${NEXT_PUBLIC_DEMO_CONSULTA_LABEL:-}
    ports:
      - "${PORT:-3000}:3000"
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - NEXT_PUBLIC_DEMO_MODE=${NEXT_PUBLIC_DEMO_MODE:-false}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - ALLOW_HTTP_COOKIES=true
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s  # ⏱️ Aumentado para permitir migraciones de Prisma

  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: cardsystem_db  # ✅ Nombre explícito para facilitar debugging
    environment:
      POSTGRES_USER: cardsystem
      # 🔐 CORRECCIÓN CRÍTICA: Password obligatorio para crear el usuario
      # Opción A: Usar variable de entorno con validación (recomendado para Coolify)
      POSTGRES_PASSWORD: ${DB_PASSWORD:-}
      # Opción B: Valor directo para desarrollo (NO usar en producción):
      # POSTGRES_PASSWORD: Cardsystem2024!Secure#
      POSTGRES_DB: sistema_tarjetas
      # ✅ Opcional: Mejorar compatibilidad con caracteres especiales
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
      # ✅ Opcional: Script de inicialización para permisos adicionales
      # - './init-db.sql:/docker-entrypoint-initdb.d/init.sql'
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      # ✅ Verificar que la DB específica esté ready, no solo el servidor
      test: ["CMD-SHELL", "pg_isready -U cardsystem -d sistema_tarjetas"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data_v2:
    name: cardsystem_postgres_data_v2  # ✅ Nombre explícito para mejor gestión en Coolify
    driver: local

# ✅ Opcional: Network explícito para aislamiento
networks:
  default:
    name: cardsystem_network
    driver: bridge